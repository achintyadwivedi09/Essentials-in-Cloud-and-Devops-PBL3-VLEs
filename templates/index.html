<!DOCTYPE html>
<html>
<head>
    <title>DevOps Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        h1 {
            margin-top: 20px;
        }
        .card {
            background: #1e293b;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .green { color: #22c55e; }
        .blue { color: #3b82f6; }
    </style>
</head>
<body>

<h1>🚀 DevOps Live Dashboard</h1>

<div class="card">
    <h2 id="env">Environment</h2>
    <p>Status: <span class="green">Running</span></p>
</div>

<div class="card">
    <h2>System Time</h2>
    <p id="time"></p>
</div>

<div class="card">
    <h2>Deployment Info</h2>
    <p>Version: v2</p>
    <p>CI/CD: Jenkins Enabled</p>
</div>

<script>
    // Dynamic Time
    function updateTime() {
        document.getElementById("time").innerText = new Date().toLocaleString();
    }
    setInterval(updateTime, 1000);

    // Change environment dynamically
    const env = window.location.port == "5001" ? "GREEN Deployment ✅" : "BLUE Deployment 🔵";
    document.getElementById("env").innerText = env;
</script>

</body>
</html>
