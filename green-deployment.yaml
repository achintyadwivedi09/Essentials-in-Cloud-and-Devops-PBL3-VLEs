apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app-green
  template:
    metadata:
      labels:
        app: devops-app-green
    spec:
      containers:
      - name: devops-container
        image: devops-app:v2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000